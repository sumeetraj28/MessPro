<!-- 404.html for GitHub Pages SPA fallback -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=/MessPro/" />
    <script>
      // For client-side routing fallback
      var path = location.pathname.replace(/^\/MessPro/, '');
      location.replace('/MessPro/' + (path ? '#' + path : ''));
    </script>
  </head>
  <body></body>
</html>
